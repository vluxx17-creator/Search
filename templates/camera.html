<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камера для лога</title>
    <style>
        video { width: 100%; max-width: 400px; display: block; margin: 20px auto; border: 2px solid #000; }
        button { display: block; margin: 10px auto; padding: 12px 24px; font-size: 18px; }
        #result { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Сделайте снимок</h2>
    <video id="video" autoplay playsinline></video>
    <button id="capture">📸 Сфотографировать</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="result"></div>
    <script>
        const userId = '{{USER_ID}}';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture');
        const resultDiv = document.getElementById('result');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { resultDiv.innerText = 'Ошибка доступа к камере: ' + err.message; });

        captureBtn.addEventListener('click', function() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            canvas.toBlob(function(blob) {
                const formData = new FormData();
                formData.append('user_id', userId);
                formData.append('photo', blob, 'photo.jpg');
                fetch('/upload_photo', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        resultDiv.innerText = '✅ Фото отправлено!';
                    } else {
                        resultDiv.innerText = '❌ Ошибка: ' + data.error;
                    }
                })
                .catch(err => {
                    resultDiv.innerText = '❌ Ошибка отправки: ' + err;
                });
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
